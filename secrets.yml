---
# ============================================================
# PMDB 密钥配置
# ⚠️  此文件包含敏感信息，已加入 .gitignore，绝不提交版本控制！
# ✅  参考示例：secrets.yml.example
# ============================================================

# ── 翻译服务配置 ─────────────────────────────────────────────
# 选择翻译提供商：mistral / openai / groq / nvidia / gemini
translate_provider: "mistral"   # 当前激活的翻译提供商

# ── API Keys（填写你拥有的提供商密钥，其余留空即可）──────────

# Google Gemini
gemini_api_key: "AQ. -tQ"

# OpenAI
openai_api_key: "sk-proj- - "

# Mistral AI（同时用于 IMDb AI 兜底查询）
mistral_api_key: " "

# Groq
groq_api_key: " "

# Nvidia NIM
nvidia_api_key: "nvapi- - "

# ── 翻译模型选择 ─────────────────────────────────────────────
gemini_translate_model: "gemini-2.5-flash"
openai_translate_model: "gpt-4o-mini"
mistral_translate_model: "mistral-large-latest"
groq_translate_model: "llama-3.3-70b-versatile"
nvidia_translate_model: "meta/llama-3.3-70b-instruct"

# IMDb AI 兜底查询模型（使用 Mistral API，建议用轻量快速模型）
imdb_lookup_model: "mistral-small-latest"

# ── OMDb API ─────────────────────────────────────────────────
# 免费注册：https://www.omdbapi.com/apikey.aspx（每日 1000 次）
omdb_api_key: ""

# ── 运行参数（可选，以下为默认值）───────────────────────────
max_workers: 10
max_movies: 100
mistral_batch_size: 10
request_timeout: 15
retry_delay_min: 0.2
retry_delay_max: 0.5

# ── 爬虫 Fallback 源（可选，内置默认值已足够）────────────────
# 按优先级排序，第一个可访问的源会被使用，后续为备用
# 如无需自定义，注释掉此项，程序将使用内置 TPB 镜像列表
# scraper_urls:
#   - "https://thepiratebay.org/search.php?q=top100:207"
#   - "https://piratebay.live/search.php?q=top100:207"
#   - "https://tpb.party/search.php?q=top100:207"
#   - "https://thepiratebay.org/top/207"
