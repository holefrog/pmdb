---
# ansible/roles/pmdb/tasks/main.yml
# 主任务文件，通过 include_tasks 组织步骤

- name: 01. 部署前检查 (Python, 系统依赖, Secrets)
  include_tasks: 01_preflight.yml

- name: 02. 部署程序文件
  include_tasks: 02_deploy_files.yml

- name: 03. 安装虚拟环境和依赖
  include_tasks: 03_venv_and_deps.yml

- name: 04. 生成和验证配置文件
  include_tasks: 04_config.yml

- name: 05. 完成部署
  include_tasks: 05_finish.yml
