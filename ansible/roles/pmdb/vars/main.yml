---
# ansible/roles/pmdb/vars/main.yml
# 非敏感的角色变量（敏感信息来自 secrets.yml）

# 项目根目录（相对 playbook 计算）
pmdb_project_root: "{{ playbook_dir }}/.."

# Python 虚拟环境路径
pmdb_venv_dir: "{{ pmdb_project_root }}/venv"

# config.ini 输出路径
pmdb_config_output: "{{ pmdb_project_root }}/config.ini"

# config.ini.j2 模板路径
pmdb_config_template: "config.ini.j2"

# 最低 Python 版本
pmdb_min_python_version: "3.8"
